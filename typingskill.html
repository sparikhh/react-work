<!DOCTYPE html>
<html>
  <head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container mt-3">
      <div class="card">
        <div class="card-body">
          <p class="h5"><span id="clock"></span></p>
          <p><span id="timer" class="badge rounded-pill bg-info">00:00:00</span></p>
          <textarea class="form-control" id="myTextArea" rows="4" cols="50" placeholder="type here..."></textarea>
          <br>
          <button type="button" class="btn btn-primary" id="resetBtn">Reset</button>
        
        <hr/>
      
          <h4><mark> Summary </mark> </h4>
          <br>
          <p>Words typed per second: <span id="words"></span></p>
          <p>Characters typed per second: <span id="chars"></span></p>
          <p>Sentences typed per minute: <span id="sentence"></span></p>
        </div>
      </div>
    </div>
    <script>
      const inputField = document.getElementById('myTextArea');
      const resultDisplay = document.getElementById('words');

      let startTimeSummary, endTimeSummary;

<!-- const currentTimeString = new Date(); -->
<!-- document.getElementById('clock').innerHTML=currentTimeString; -->
    let a;
    let time;
setInterval(() => {
      a = new Date();
      time = a.getHours() + ':' + a.getMinutes() + ':' + a.getSeconds();
      document.getElementById('clock').innerHTML = time;
    }, 1000);
console.log(time);

const resetBtn = document.getElementById('resetBtn');
let timerInterval;
let startTime;
const display = document.getElementById('timer');
const textArea = document.getElementById('myTextArea');

function startStopwatch() {
    startTimeSummary = performance.now();
    startTime = Date.now();
    timerInterval = setInterval(updateDisplay, 1000);
}

function stopStopwatch() {
  const typedText = myTextArea.value;
  endTimeSummary = performance.now(); // Stop timer
  const totalTimeSeconds = (endTimeSummary - startTimeSummary) / 1000;

     const words = typedText.trim().split(/\s+/);
    const wordCount = words.length;
  
  <!-- const wordCount = e.target.value.split(/\s+/).filter(Boolean).length; -->
  const wps = wordCount / totalTimeSeconds;
  const ws = wps.toFixed(2);
  resultDisplay.innerHTML = ws;
  console.log(`Words per second: ${wps.toFixed(2)}`);
    clearInterval(timerInterval); // Stop the interval
}

function updateDisplay() {
    const elapsedTime = Date.now() - startTime;
    const seconds = Math.floor(elapsedTime / 1000) % 60;
    const minutes = Math.floor(elapsedTime / (1000 * 60)) % 60;
    const hours = Math.floor(elapsedTime / (1000 * 60 * 60));

    const formattedTime = [hours, minutes, seconds]
        .map(unit => unit.toString().padStart(2, '0'))
        .join(':');

    display.textContent = formattedTime;
}

    resetBtn.addEventListener('click', () => {
        clearInterval(timerInterval);
        timer.textContent = "00:00:00";
    });

textArea.addEventListener('focus', startStopwatch);
textArea.addEventListener('blur', stopStopwatch);

    </script>
  </body>
</html>
