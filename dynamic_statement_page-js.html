<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript</title>
    <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
	<style>
		h2 {
    display: flex
;
    justify-content: center;
}
	</style>
  </head>
 <body>
 <div class="container mt-3">

  <div class="row">
    <div class="card">
     <h2>Bank Statement</h2>
     <div class="input-group mb-3">
      <input type="text" class="form-control" id="idInput" placeholder="Enter TxnID">
      <input type="text" class="form-control" id="dateInput" placeholder="Enter TxnDate">
      <input type="text" class="form-control" id="headerInput" placeholder="Enter Header">
      <input type="text" class="form-control" id="creditInput" placeholder="Enter Credit">
      <input type="text" class="form-control" id="debitInput" placeholder="Enter Debit">
      <button class="btn btn-primary" onclick="addRow()">Add</button>
     </div>
     <hr>
    <table class="table table-bordered" id="dataTable" border="1">
        <thead>
            <tr>
                <th>TxnId</th>
                <th>TxnDate</th>
                <th>Header</th>
                <th>Credit</th>
                <th>Debit</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">

        </tbody>
    </table>
    <br>
    <table class="table table-bordered" id="dataTable2" border="1">
        <thead>
            <tr>
                <th>Total Credited</th>
		<th>Total Debited</th>
            </tr>
        </thead>
        <tbody id="tableBody2">
            <tr>
        	<td id="totalValCredit"></td>
        	<td id="totalValDebit"></td>
      	    </tr>
        </tbody>
    </table>
	<br>
    <table class="table table-bordered" id="dataTable3" border="1">
        <thead>
            <tr>
                <th>Total Balance</th>
            </tr>
        </thead>
        <tbody id="tableBody3">
            <tr>
        	<td id="totalBal"></td>
      	    </tr>
        </tbody>
    </table>
        <!-- <p>Totals: <span id="totalValCredit"></span> <span id="totalValDebit"></span></p> 
        <p>Balance: <span id="balance"></span></p> -->
  </div>
 </div>
    <script>
  const idInput = document.getElementById('idInput');
const dateInput = document.getElementById('dateInput');
const headerInput = document.getElementById('headerInput');
const creditInput = document.getElementById('creditInput');
const debitInput = document.getElementById('debitInput');
const tableBody = document.getElementById('tableBody');
const totalValCredit = document.getElementById('totalValCredit');
const totalValDebit = document.getElementById('totalValDebit');
const totalBal = document.getElementById('totalBal');

let records = JSON.parse(localStorage.getItem("tableRecords")) || [];

function renderTable() {
    tableBody.innerHTML = ''; 
    records.forEach((record, index) => {
        const row = tableBody.insertRow();
        
        const cell1 = row.insertCell(0);
        const cell2 = row.insertCell(1);
        const cell3 = row.insertCell(2);
        const cell4 = row.insertCell(3);
        const cell5 = row.insertCell(4);
        const cell6 = row.insertCell(5);

        cell1.textContent = record.id;
        cell2.textContent = record.date;
        cell3.textContent = record.header;
        cell4.textContent = record.credit;
        cell5.textContent = record.debit;
        
        cell6.innerHTML = `<button class="btn btn-warning" onclick="removeRow(${index})">Remove</button>`;
    });
}


function addRow() {
    const id = idInput.value;
    const date = dateInput.value;
    const header = headerInput.value;
    const credit = creditInput.value;
    const debit = debitInput.value;

    if (id && date && header && credit && debit) {
        records.push({ id, date, header, credit, debit }); 
        updateLocalStorage();
        idInput.value = ''; // Clear input fields
        dateInput.value = '';
        headerInput.value = '';
        creditInput.value = '';
        debitInput.value = '';
    }
}


function removeRow(index) {
    records.splice(index, 1); 
    updateLocalStorage();
}


function updateLocalStorage() {
    localStorage.setItem("tableRecords", JSON.stringify(records)); 
    renderTable(); 
}

function calculateTotals() {
    
    const storedData = localStorage.getItem('tableRecords');


    const transactions = storedData ? JSON.parse(storedData) : [];

    let totalCredit = 0;
    let totalDebit = 0;


    transactions.forEach(transaction => {

        const credit = parseFloat(transaction.credit) || 0;
        const debit = parseFloat(transaction.debit) || 0;

        totalCredit += credit;
        totalDebit += debit;
    });


    return { totalCredit, totalDebit };
}


const totals = calculateTotals();
totalValCredit.textContent = totals.totalCredit;
totalValDebit.textContent = totals.totalDebit;
console.log('Total Credit:', totals.totalCredit);
console.log('Total Debit:', totals.totalDebit);

const totalBalance = totals.totalCredit - totals.totalDebit;
totalBal.textContent = totalBalance;


document.addEventListener('DOMContentLoaded', renderTable);

    </script> 
  </body>
</html>
